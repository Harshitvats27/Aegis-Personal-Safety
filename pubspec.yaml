name: women_safety
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+9
environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.3.2
  carousel_slider: ^5.1.2
  webview_flutter: ^4.13.1
  flutter_phone_direct_caller: ^2.2.1
  url_launcher: ^6.3.2
  fluttertoast: ^9.0.0
  firebase_core: ^3.13.1
  firebase_auth: ^5.6.2
  cloud_firestore: ^5.6.8
  google_sign_in: ^6.2.1
  shared_preferences: ^2.5.3
  permission_handler: ^12.0.1
  sqflite: ^2.4.2
  flutter_contacts: ^1.1.7
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  font_awesome_flutter: ^10.7.0
  image_picker: ^1.2.1
  firebase_storage: ^12.4.10
  cached_network_image: ^3.4.1
  flutter_rating_bar: ^4.0.1
  shake: ^2.2.0

  uuid: any
  google_nav_bar: ^5.0.7
  curved_navigation_bar: ^1.0.6
  flutter_background_service: ^5.1.0
  flutter_local_notifications: ^20.1.0
dev_dependencies:
 flutter_test:
    sdk: flutter


 flutter_lints: ^5.0.0
 flutter_native_splash: ^2.4.7
 flutter_launcher_icons: ^0.13.1

dependency_overrides:
  sensors_plus: ^5.0.1


flutter:

  uses-material-design: true

  assets:
    - assets/
flutter_launcher_icons:
  android: true
  ios: true
  android_round: true
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_background_dark: "#000000"
  adaptive_icon_foreground: "assets/women_safety_logo.png"
  adaptive_icon_foreground_dark: "assets/women_safety_logo.png"
  image_path_android: "assets/women_safety_logo.png"
  image_path_ios: "assets/women_safety_logo.png"

flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#000000"
  image_dark: assets/black_app_logo.png
  image: assets/white_app_logo.png

  android_12:
    color: "#FFFFFF"
    color_dark: "#000000"
    image_dark: assets/black_app_logo.png
    image: assets/white_app_logo.png

  web: false